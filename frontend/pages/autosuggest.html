<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left-bar{
            position: fixed;
            top: 20px;
            left: 20px;
        }
        .right-bar{
            position: fixed;
            top:20px;
            right:20px;
        }
        .search-section{
            text-align: center;
            margin-top: 100px;
        }
        .J{
            color: rgb(8, 24, 147);
        }
        .Ja{
            color: rgba(253, 16, 209, 0.684);
        }
        .tag-line{
            color: rgb(212, 11, 11);
        }
        .lens{
            position: relative;
            left: 40px;
        }
        .search-box{
            padding: 15px 15px 15px 45px;
            border-radius: 30px;
            width: 40%;
        }
        #suggestion-box{
            /*border: 1px solid black;*/
            width: 45%;
            margin-left: 28%;
        }
    </style>
</head>
<body>
    <div>
        <span class="left-bar">&#9881;</span>
        <span class="right-bar">&#x2022; Online | &#x1F552; -ms</span>
    </div>

    <div class="search-section">
        <h1><span class="J">Being</span><span class="Ja">Infinity</span></h1>
        <p class="tag-line">One million phrases.Four Algorithms.Prefix based Auto Suggest.</p>

        <span>
            <span class="lens">&#128269;</span>
            <input class="search-box" id="search-box" placeholder="Type Here to search">
        </span>

        <div id="suggestion-box">
            <!-- Suggestion Box -->
        </div>

        <div id="suggestions"></div>
    </div>

    <script>
        var searchBox = document.querySelector('.search-box');

        searchBox.addEventListener("input", function() {
            var userInput = searchBox.value;

            if (userInput.trim() !== "") {
                var url1 = "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url3 = "&algorithm=brute&limit=10&weighted=false";
                var url = url1 + userInput + url3;

                fetch(url)
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    console.log(data);
                    var resultsArray = data.results;
                    var html = "";
                    for (var i = 0; i < resultsArray.length; i++) {
                        html += "<div>" + resultsArray[i] + "</div>";
                    }
                });
            }
        });
    </script>
</body>
</html>
